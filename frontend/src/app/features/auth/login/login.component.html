<div class="auth-form-wrapper">
  <div class="auth-header">
    <h1>Sign into your account</h1>
    <p>Sign in to access your dashboard</p>
  </div>

  <div class="auth-tabs">
    <a routerLink="/auth/register" class="auth-tab">Sign up</a>
    <a routerLink="/auth/login" class="auth-tab active">Log in</a>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <div class="password-label-row">
        <label>Password</label>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>
      <div class="password-input">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter your password" />
        <span class="icon-eye" (click)="togglePasswordVisibility()">
          <ng-icon [name]="showPassword ? 'lucideEyeOff' : 'lucideEye'" size="18"></ng-icon>
        </span>
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
      {{ loading ? 'Logging in...' : 'Log in' }}
    </button>
  </form>

  <div class="social-auth">
    <button class="btn-social" type="button">
      <ng-icon name="lucideGithub" size="20"></ng-icon>
    </button>
    <button class="btn-social" type="button">
      <ng-icon name="lucideMonitor" size="20"></ng-icon>
    </button>
  </div>
</div>
