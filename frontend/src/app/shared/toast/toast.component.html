<div class="toast-container" aria-live="polite">
  @for (t of toasts; track trackById($index, t)) {
    <div class="toast toast-{{ t.type }}" [attr.role]="t.type === 'error' ? 'alert' : 'status'">
      <div class="toast-timer" [style.animation-duration]="t.durationMs + 'ms'"></div>
      <div class="toast-body">
        @if (t.type === 'success') {
          <ng-icon name="lucideCheckCircle" size="20" class="toast-icon"></ng-icon>
        } @else {
          <ng-icon name="lucideXCircle" size="20" class="toast-icon"></ng-icon>
        }
        <span class="toast-message">{{ t.message }}</span>
        <button type="button" class="toast-dismiss" (click)="close(t.id)" aria-label="Dismiss">
          <ng-icon name="lucideX" size="16"></ng-icon>
        </button>
      </div>
    </div>
  }
</div>
